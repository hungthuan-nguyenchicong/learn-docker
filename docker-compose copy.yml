services:
  # Container xử lý PHP
  php-handler:
    image: php:8.3-fpm-alpine
    container_name: php-fpm-container
    volumes:
      - .:/var/www/html

  # Container Web Server
  web-test:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-handler
